<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0f2a"/>
      <stop offset="100%" stop-color="#030612"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#ffc857"/>
      <stop offset="100%" stop-color="#ff2fb9" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <g filter="url(#glow)" fill="none" stroke="#00f0ff" stroke-width="3.4" stroke-linecap="round">
    <path d="M 32 32 C 40 30, 46 34, 44 42 C 42 49, 33 50, 27 46"/>
    <path d="M 32 32 C 24 34, 18 30, 20 22 C 22 15, 31 14, 37 18" opacity="0.85"/>
  </g>

  <circle cx="32" cy="32" r="10" fill="url(#core)"/>
  <circle cx="32" cy="32" r="4" fill="#fff8ec"/>
</svg>
