name: Deploy to Vercel

# Deploys the static site to Vercel production on every push to main.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN      → create at https://vercel.com/account/tokens
#   VERCEL_ORG_ID     → from .vercel/project.json after running `vercel link` locally
#   VERCEL_PROJECT_ID → same file

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege default: this workflow only reads the repo and calls
# out to Vercel — it never needs to write back to GitHub.
permissions:
  contents: read

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prod --token="$VERCEL_TOKEN"
